name: Deploy Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Zip codigo
        run: zip -r function.zip index.mjs src/ package.json node_modules

      - name: Deploy a Lambda
        run: |
          aws lambda update-function-code \
            --function-name rednacrem-api \
            --zip-file fileb://function.zip \
            --region us-east-2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy worker Lambda
        run: |
          aws lambda update-function-code \
            --function-name no-call-import-worker \
            --zip-file fileb://function.zip \
            --region us-east-2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
